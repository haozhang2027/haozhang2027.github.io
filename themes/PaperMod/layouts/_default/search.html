{{ define "main" }}
<section class="section search-page">
  <div class="section-head">
    <h1>{{ .Title }}</h1>
  </div>
  <input id="search-input" class="search-input" type="search" placeholder="{{ .Params.placeholder | default "Search posts" }}">
  <div id="search-status" class="search-status"></div>
  <div id="search-results" class="post-list"></div>
</section>

<script>
(async function () {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const status = document.getElementById('search-status');
  const response = await fetch('/index.json');
  const pages = await response.json();

  function render(items) {
    results.innerHTML = items.map((item) => `
      <article class="post-card">
        <p class="card-meta">${item.date || ''}</p>
        <h2><a href="${item.permalink}">${item.title}</a></h2>
        <p>${item.summary || ''}</p>
      </article>
    `).join('');
    status.textContent = items.length ? `${items.length} result(s)` : 'No results';
  }

  function search(q) {
    const term = q.trim().toLowerCase();
    if (!term) {
      render([]);
      return;
    }
    render(pages.filter((page) => {
      const haystack = [page.title, page.summary, page.content, (page.tags || []).join(' ')].join(' ').toLowerCase();
      return haystack.includes(term);
    }));
  }

  input.addEventListener('input', (event) => search(event.target.value));
  status.textContent = 'Type to search';
  render([]);
})();
</script>
{{ end }}
